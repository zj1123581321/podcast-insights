<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>《肥话连篇》推荐地图</title>
  <link rel="stylesheet" href="./styles.css" />
  <!-- 成熟库，CDN 引入，零 build。app.js 必须在 Alpine 之前定义 window.feihua，
       否则 Alpine 自启动的微任务会先于 app.js 执行，导致 "feihua is not defined"。 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js" defer></script>
  <script src="./app.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
</head>
<body>
<div id="app" x-data="feihua()" x-init="init()">

  <header class="topbar">
    <h1>《肥话连篇》推荐</h1>
    <span class="sub" x-text="headline"></span>
  </header>

  <!-- 加载/错误态 -->
  <template x-if="loadError">
    <div class="banner err" x-text="loadError"></div>
  </template>

  <nav class="tabs">
    <template x-for="t in tabs" :key="t.k">
      <button :class="{active: tab===t.k}" @click="setTab(t.k)" x-text="t.label"></button>
    </template>
  </nav>

  <!-- 过滤器（跨 tab 共享） -->
  <section class="filters" x-show="!loading">
    <input type="search" placeholder="搜索 名称/理由/原文…" x-model="filters.q" />
    <select x-model="filters.category">
      <option value="">全部类型</option>
      <option value="place">实地</option>
      <option value="product">好物</option>
      <option value="media">影视剧</option>
    </select>
    <select x-model="filters.recommender">
      <option value="">全部主播</option>
      <template x-for="r in recommenders" :key="r"><option :value="r" x-text="r"></option></template>
    </select>
    <template x-for="v in verdicts" :key="v.k">
      <button class="chip" :class="{on: filters.verdicts.includes(v.k)}"
              :style="filters.verdicts.includes(v.k) ? ('background:'+v.color+';border-color:'+v.color) : ''"
              @click="toggleVerdict(v.k)" x-text="v.k"></button>
    </template>
    <button class="chip clear" @click="resetFilters()" x-show="dirty">清空</button>
    <span class="count" x-text="filtered.length + ' 条'"></span>
  </section>

  <main x-show="loading" class="loading">加载中…</main>

  <!-- 地图 -->
  <section x-show="!loading && tab==='map'" class="pane">
    <div id="map" class="echart"></div>
    <p class="note">
      地图按城市落点（点击进城市清单）。<span x-text="overseas.length"></span> 个海外城市见下方列表；
      <span x-text="stats.place_unlocated || 0"></span> 条实地推荐无定位。
    </p>
    <template x-if="overseas.length">
      <div class="overseas">
        <strong>海外：</strong>
        <template x-for="c in overseas" :key="c">
          <button class="citytag" @click="goCity(c)" x-text="c + '(' + cityCount(c) + ')'"></button>
        </template>
      </div>
    </template>
  </section>

  <!-- 列表 -->
  <section x-show="!loading && tab==='list'" class="pane">
    <template x-if="activeCity">
      <div class="cityhead">
        <strong x-text="activeCity"></strong> 的推荐
        <button class="link" @click="goCity('')">← 全部</button>
      </div>
    </template>
    <div class="cards">
      <template x-for="it in filtered" :key="it.id">
        <article class="card" :id="'item-'+it.id" :class="{hot: it.id===route.item, ['v-'+it.verdict]: true}">
          <div class="cardtop">
            <a class="name" :href="shopUrl(it)" target="_blank" rel="noopener noreferrer" x-text="it.name"></a>
            <span class="badge" :style="'background:'+verdictColor(it.verdict)" x-text="it.verdict"></span>
          </div>
          <div class="meta">
            <span x-text="catLabel(it.category)"></span>
            <template x-if="it.display_city"><span>· <a class="link" @click.prevent="goCity(it.display_city)" :href="'#/city/'+encodeURIComponent(it.display_city)" x-text="it.display_city"></a></span></template>
            <template x-if="it.item.category"><span x-text="'· '+it.item.category"></span></template>
            <span x-text="'· '+it.recommender"></span>
            <span class="vol">VOL.<span x-text="String(it.vol).padStart(3,'0')"></span></span>
            <a class="link" :href="'#/item/'+it.id" @click.prevent="goItem(it.id)">链接</a>
          </div>
          <p class="reason" x-text="reasonOf(it)"></p>
          <p class="quote" :class="{warn: it.quote_unverified}" x-text="'「'+(it.item.quote||'')+'」'"></p>
        </article>
      </template>
      <p x-show="!filtered.length" class="empty">没有匹配的推荐。换个筛选试试。</p>
    </div>
  </section>

  <!-- 口味画像 -->
  <section x-show="!loading && tab==='taste'" class="pane">
    <div id="taste" class="echart"></div>
    <div id="tasteVerdict" class="echart small"></div>
  </section>

  <!-- 红黑榜 -->
  <section x-show="!loading && tab==='blacklist'" class="pane">
    <p class="note">避雷 + 一般：别人替你踩过的坑。</p>
    <div class="cards">
      <template x-for="it in blacklist" :key="it.id">
        <article class="card" :class="['v-'+it.verdict]">
          <div class="cardtop">
            <a class="name" :href="shopUrl(it)" target="_blank" rel="noopener noreferrer" x-text="it.name"></a>
            <span class="badge" :style="'background:'+verdictColor(it.verdict)" x-text="it.verdict"></span>
          </div>
          <div class="meta">
            <span x-text="catLabel(it.category)"></span>
            <template x-if="it.display_city"><span x-text="'· '+it.display_city"></span></template>
            <span x-text="'· '+it.recommender"></span>
            <span class="vol">VOL.<span x-text="String(it.vol).padStart(3,'0')"></span></span>
          </div>
          <p class="reason" x-text="reasonOf(it)"></p>
        </article>
      </template>
    </div>
  </section>

  <footer class="foot">
    数据来自播客《肥话连篇》结构化提取 · 地图含审图号 GS(2019)1719 合规底图 · 纯静态站
  </footer>
</div>
</body>
</html>
